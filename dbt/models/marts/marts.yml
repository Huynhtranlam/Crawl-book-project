version: 2

models:
  - name: mart_btc_ohlcv
    description: "Analytics-ready BTC OHLCV candles with indicators."
    columns:
      - name: event_id
        tests:
          - not_null
          - unique
      - name: symbol
        tests:
          - not_null
      - name: interval
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["5m"]
      - name: candle_time
        tests:
          - not_null
      - name: close
        tests:
          - not_null
      - name: trend_regime
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["bullish", "bearish", "ranging"]
  - name: mart_btc_price_latest
    description: "Latest BTC market snapshot with decision-support metrics."
    columns:
      - name: symbol
        tests:
          - not_null
          - unique
      - name: as_of_time
        tests:
          - not_null
      - name: last_price
        tests:
          - not_null
      - name: trend_regime
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["bullish", "bearish", "ranging"]
      - name: momentum_regime
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["strengthening", "weakening", "neutral"]
      - name: volatility_regime
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["normal", "elevated", "extreme"]
