# TODO: Apply any additional repository constraints from RULES.md once that file is provided.
x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: airflow/Dockerfile
    args:
      AIRFLOW_VERSION: ${AIRFLOW_VERSION:-3.1.8}
  image: crawl-book-airflow:${AIRFLOW_VERSION:-3.1.8}
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: ${AIRFLOW_EXECUTION_API_SERVER_URL:-http://airflow-api-server:8080/execution/}
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_METADATA_DB_USER:-airflow}:${AIRFLOW_METADATA_DB_PASSWORD:-airflow}@airflow-postgres:5432/${AIRFLOW_METADATA_DB_NAME:-airflow}
    AIRFLOW__API__SECRET_KEY: ${AIRFLOW_API_SECRET_KEY:-airflow-local-api-secret-key}
    AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW_API_AUTH_JWT_SECRET:-airflow-local-jwt-secret-key}
    AIRFLOW_KAFKA_BOOTSTRAP_SERVERS: ${AIRFLOW_KAFKA_BOOTSTRAP_SERVERS:-kafka:29092}
    AIRFLOW_MARKET_PIPELINE_SCHEDULE: "${AIRFLOW_MARKET_PIPELINE_SCHEDULE:-*/5 * * * *}"
    AIRFLOW_MARKET_TICKER_TOPIC: ${AIRFLOW_MARKET_TICKER_TOPIC:-market.raw.ticker}
    AIRFLOW_MARKET_KLINES_TOPIC: ${AIRFLOW_MARKET_KLINES_TOPIC:-market.raw.klines}
    AIRFLOW_POSTGRES_HOST: ${AIRFLOW_POSTGRES_HOST:-postgres}
    AIRFLOW_POSTGRES_PORT: ${AIRFLOW_POSTGRES_PORT:-5432}
    AIRFLOW_POSTGRES_DB: ${POSTGRES_DB:-analytics}
    AIRFLOW_POSTGRES_USER: ${POSTGRES_USER:-analytics}
    AIRFLOW_POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-analytics123}
    AIRFLOW_STREAM_PROCESSOR_GROUP_ID: ${AIRFLOW_STREAM_PROCESSOR_GROUP_ID:-stream-processor-airflow}
    AIRFLOW_STREAM_PROCESSOR_BATCH_SIZE: ${AIRFLOW_STREAM_PROCESSOR_BATCH_SIZE:-500}
    AIRFLOW_MARKET_DATA_API_BASE_URL: ${AIRFLOW_MARKET_DATA_API_BASE_URL:-https://api.binance.com/api/v3}
    AIRFLOW_MARKET_SOURCE_NAME: ${AIRFLOW_MARKET_SOURCE_NAME:-binance}
    AIRFLOW_MARKET_SYMBOL: ${AIRFLOW_MARKET_SYMBOL:-BTCUSDT}
    AIRFLOW_MARKET_KLINE_INTERVAL: ${AIRFLOW_MARKET_KLINE_INTERVAL:-5m}
    AIRFLOW_MARKET_KLINE_LIMIT: ${AIRFLOW_MARKET_KLINE_LIMIT:-500}
    AIRFLOW_MARKET_HTTP_TIMEOUT_SECONDS: ${AIRFLOW_MARKET_HTTP_TIMEOUT_SECONDS:-30}
    AIRFLOW_MARKET_HTTP_MAX_RETRIES: ${AIRFLOW_MARKET_HTTP_MAX_RETRIES:-3}
    AIRFLOW_MARKET_HTTP_BACKOFF_SECONDS: ${AIRFLOW_MARKET_HTTP_BACKOFF_SECONDS:-2}
    KAFKA_CLIENT_ID: ${KAFKA_CLIENT_ID:-market-data-producer}
    KAFKA_REQUEST_TIMEOUT_MS: ${KAFKA_REQUEST_TIMEOUT_MS:-10000}
    PYTHONPATH: /opt/pipeline
  volumes:
    - .:/opt/pipeline
    - ./airflow/dags:/opt/airflow/dags
    - airflow_logs:/opt/airflow/logs
  networks:
    - pipeline
  depends_on:
    kafka:
      condition: service_healthy
    postgres:
      condition: service_healthy
    airflow-postgres:
      condition: service_healthy

services:
  kafka:
    image: apache/kafka:${KAFKA_VERSION:-4.1.2}
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:29092,CONTROLLER://:9093,EXTERNAL://:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,EXTERNAL://localhost:${KAFKA_PORT:-9092}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 1
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1 || exit 1",
        ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - pipeline

  postgres:
    image: postgres:${POSTGRES_VERSION:-16-alpine}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-analytics}
      POSTGRES_USER: ${POSTGRES_USER:-analytics}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-analytics123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-analytics} -d ${POSTGRES_DB:-analytics}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - pipeline

  minio:
    image: minio/minio:${MINIO_VERSION:-RELEASE.2024-01-16T16-07-38Z}
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    volumes:
      - minio_data:/data
    networks:
      - pipeline

  airflow-postgres:
    image: postgres:${POSTGRES_VERSION:-16-alpine}
    environment:
      POSTGRES_DB: ${AIRFLOW_METADATA_DB_NAME:-airflow}
      POSTGRES_USER: ${AIRFLOW_METADATA_DB_USER:-airflow}
      POSTGRES_PASSWORD: ${AIRFLOW_METADATA_DB_PASSWORD:-airflow}
    volumes:
      - airflow_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${AIRFLOW_METADATA_DB_USER:-airflow} -d ${AIRFLOW_METADATA_DB_NAME:-airflow}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - pipeline

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - >
        set -e;
        airflow db migrate
    restart: "no"

  airflow-api-server:
    <<: *airflow-common
    command: api-server
    ports:
      - "${AIRFLOW_UI_PORT:-8080}:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-dag-processor:
    <<: *airflow-common
    command: dag-processor
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  metabase:
    image: metabase/metabase:${METABASE_VERSION:-v0.59.3}
    ports:
      - "${METABASE_PORT:-3000}:3000"
    environment:
      MB_DB_FILE: /metabase-data/metabase.db
      MB_SITE_NAME: ${METABASE_SITE_NAME:-Realtime Product Analytics}
      JAVA_TIMEZONE: ${METABASE_JAVA_TIMEZONE:-UTC}
    volumes:
      - metabase_data:/metabase-data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://localhost:3000/api/health >/dev/null || exit 1",
        ]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - pipeline

  dashboard-init:
    image: python:3.12-slim
    command: python /workspace/dashboard/setup_metabase.py
    environment:
      METABASE_URL: http://metabase:3000
      METABASE_SITE_NAME: ${METABASE_SITE_NAME:-BTC Market Monitoring Dashboard}
      METABASE_ADMIN_FIRST_NAME: ${METABASE_ADMIN_FIRST_NAME:-Dashboard}
      METABASE_ADMIN_LAST_NAME: ${METABASE_ADMIN_LAST_NAME:-Admin}
      METABASE_ADMIN_EMAIL: ${METABASE_ADMIN_EMAIL:-admin@example.com}
      METABASE_ADMIN_PASSWORD: ${METABASE_ADMIN_PASSWORD:-metabase123}
      METABASE_DATABASE_NAME: ${METABASE_DATABASE_NAME:-BTC Market Warehouse}
      METABASE_DATABASE_HOST: ${METABASE_DATABASE_HOST:-postgres}
      METABASE_DATABASE_PORT: ${METABASE_DATABASE_PORT:-5432}
      METABASE_DATABASE_DBNAME: ${METABASE_DATABASE_DBNAME:-analytics}
      METABASE_DATABASE_USER: ${METABASE_DATABASE_USER:-analytics}
      METABASE_DATABASE_PASSWORD: ${METABASE_DATABASE_PASSWORD:-analytics123}
      METABASE_DATABASE_SCHEMA: ${METABASE_DATABASE_SCHEMA:-public_marts}
      METABASE_SETUP_TIMEOUT_SECONDS: ${METABASE_SETUP_TIMEOUT_SECONDS:-300}
    volumes:
      - .:/workspace:ro
    restart: "no"
    depends_on:
      metabase:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - pipeline

volumes:
  kafka_data:
  postgres_data:
  minio_data:
  airflow_postgres_data:
  airflow_logs:
  metabase_data:

networks:
  pipeline:
    driver: bridge
